# 이 파일은 YOLOv8 학습을 위한 데이터셋 설정 파일입니다.
# CVAT에서 YOLO 형식으로 데이터를 내보낸 후, 아래 경로와 클래스 정보를 수정해야 합니다.

# 학습(train) 및 검증(val) 데이터셋의 이미지 경로를 지정합니다.
# 예시: train: /path/to/your/cvat_export/images/train
# 예시: val: /path/to/your/cvat_export/images/val
# 현재 프로젝트 폴더 내에 'dataset' 폴더를 만들고 그 안에 CVAT 데이터를 넣는다고 가정합니다.
train: ./dataset/images/train
val: ./dataset/images/val

# 클래스 개수 (Number of classes)
# CVAT 프로젝트의 총 클래스 개수로 수정하세요.
nc: 1 # 예시: 3개의 클래스가 있다면 nc: 3

# 클래스 이름 (Class names)
# CVAT 프로젝트의 클래스 이름을 순서대로 나열하세요.
# 예시: names: ['person', 'car', 'bicycle']
names: ['class1'] # 예시: 'class1', 'class2', ...